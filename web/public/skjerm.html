<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Tryllemuseet – Infoskjerm</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;600&display=swap');

:root {
  --gold:    #D4A843;
  --cream:   #FBF7EF;
  --dim:     rgba(251,247,239,0.55);
  --deep:    #0E0A15;
  --border:  rgba(212,168,67,0.22);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px; height: 1920px;
  overflow: hidden;
  background: var(--deep);
  color: var(--cream);
  font-family: 'Source Sans 3', sans-serif;
}

/* ═══════════════════════════════════════════
   TOP ZONE  0 – 864 px  (45 %)
   ═══════════════════════════════════════════ */
#zone-top {
  position: absolute; top: 0; left: 0; right: 0;
  height: 864px; overflow: hidden;
}

/* Atmospheric static background */
#top-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 900px 500px at 50% 5%,  rgba(123,44,143,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 600px 700px at 85% 100%, rgba(107,15,26,0.28)  0%, transparent 60%),
    linear-gradient(175deg, #1A0A28 0%, #0E0A15 50%, #130208 100%);
}
#top-bg::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.20) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 45%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 60%  8%, rgba(255,255,255,0.16) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 35%, rgba(255,255,255,0.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 65%, rgba(255,255,255,0.09) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 78%, rgba(255,255,255,0.11) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 90%, rgba(255,255,255,0.14) 0%, transparent 100%),
    radial-gradient(1px 1px at 05% 55%, rgba(255,255,255,0.08) 0%, transparent 100%);
}

/* Video layer (hidden when no videos) */
#top-video {
  position: absolute; inset: 0; z-index: 1;
  display: none; overflow: hidden;
}
#main-video {
  width: 100%; height: 100%; object-fit: cover;
}
/* YouTube: scale 16:9 to fill 1080×864 — crop sides */
#yt-outer {
  position: absolute; top: 0; left: 0;
  width: 1080px; height: 864px;
  overflow: hidden; display: none;
}
#yt-outer > iframe, #yt-player {
  position: absolute !important;
  left: -228px !important; top: 0 !important;
  width: 1536px !important; height: 864px !important;
  border: 0; pointer-events: none;
}
/* Darkening shade over video */
#top-shade {
  position: absolute; inset: 0; z-index: 2;
  background: rgba(10,7,17,0.32);
  pointer-events: none; display: none;
}

/* Museum name – shown when no video */
#top-name {
  position: absolute; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.top-name-h {
  font-family: 'Cinzel', serif;
  font-size: 96px; font-weight: 700;
  letter-spacing: 0.02em; line-height: 1;
  color: var(--cream); text-align: center;
}
.top-name-h em { font-style: italic; color: var(--gold); }
.top-name-rule {
  width: 280px; height: 1px; margin: 36px auto;
  background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
  opacity: 0.55;
}
.top-name-sub {
  font-size: 16px; letter-spacing: 0.40em; text-transform: uppercase;
  color: var(--dim); font-weight: 300;
}

/* Logo + clock — always on top */
#top-bar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 4;
  display: flex; justify-content: space-between; align-items: center;
  padding: 40px 64px 0;
}
.top-logo  { height: 52px; width: auto; }
.top-clock {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 22px; font-weight: 300; color: var(--dim);
  letter-spacing: 0.05em; font-variant-numeric: tabular-nums;
}

/* Gradient fade into mid zone */
#top-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 160px; z-index: 5;
  background: linear-gradient(to bottom, transparent, var(--deep) 100%);
  pointer-events: none;
}

/* ═══════════════════════════════════════════
   MID ZONE  864 – 1632 px  (40 %)
   ═══════════════════════════════════════════ */
#zone-mid {
  position: absolute; top: 864px; left: 0; right: 0; height: 768px;
  display: flex; flex-direction: column;
}

.mid-slot {
  flex: 1;            /* 256 px each */
  padding: 26px 72px;
  border-top: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: center;
  overflow: hidden;
}

/* — Event slot — */
.mid-event .slot-eyebrow {
  font-size: 11px; letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 8px;
  font-family: 'Source Sans 3', sans-serif;
}
.mid-event .slot-date {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 18px; font-weight: 400; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 8px;
}
.mid-event .slot-title {
  font-family: 'Cinzel', serif;
  font-size: 38px; font-weight: 700; color: var(--cream);
  line-height: 1.15; margin-bottom: 8px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.mid-event .slot-meta {
  font-size: 18px; font-weight: 300; color: var(--dim);
}

/* — Quote slot — */
.mid-quote .slot-qmark {
  font-family: 'Lora', serif;
  font-size: 60px; line-height: 0.6;
  color: var(--gold); opacity: 0.40; margin-bottom: 14px;
}
.mid-quote .slot-qtext {
  font-family: 'Lora', serif;
  font-size: 26px; font-style: italic; line-height: 1.55; color: var(--cream);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.mid-quote .slot-qauthor {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--gold); margin-top: 12px;
}

/* ═══════════════════════════════════════════
   BOT ZONE  1632 – 1920 px  (15 %)
   ═══════════════════════════════════════════ */
#zone-bot {
  position: absolute; top: 1632px; left: 0; right: 0; height: 288px;
  border-top: 1px solid rgba(212,168,67,0.40);
  background: rgba(8,5,14,0.90);
  display: flex; flex-direction: column;
}

/* Opening hours row */
#bot-info {
  height: 88px;
  display: flex; align-items: center; gap: 20px;
  padding: 0 72px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.bot-label {
  font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; white-space: nowrap;
  font-family: 'Source Sans 3', sans-serif;
}
.bot-hours {
  font-size: 24px; font-weight: 300; color: var(--cream);
  font-family: 'Source Sans 3', sans-serif;
}

/* Sponsor logo carousel */
#bot-partners {
  flex: 1;
  display: flex; align-items: center;
  overflow: hidden;
}
.partners-track {
  display: inline-flex; align-items: center; white-space: nowrap;
  animation: p-roll 35s linear infinite;
}
.partner-item {
  padding: 0 52px;
  display: flex; align-items: center; justify-content: center;
}
.partner-logo {
  height: 56px; width: auto; max-width: 200px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.50;
}
.partner-name {
  font-size: 18px; font-weight: 300; letter-spacing: 0.05em;
  color: rgba(251,247,239,0.38);
}
@keyframes p-roll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
</style>
</head>
<body>

<!-- ══ TOP ZONE ══════════════════════════════════ -->
<div id="zone-top">
  <div id="top-bg"></div>
  <div id="top-video">
    <video id="main-video" autoplay muted playsinline></video>
    <div id="yt-outer"><div id="yt-player"></div></div>
  </div>
  <div id="top-shade"></div>
  <div id="top-name">
    <div class="top-name-h">Trylle<em>museet</em></div>
    <div class="top-name-rule"></div>
    <div class="top-name-sub">Norges minste og mest magiske museum</div>
  </div>
  <div id="top-bar">
    <img class="top-logo" src="/LOGO-bred.png" alt="Tryllemuseet">
    <span class="top-clock" id="clock">--:--</span>
  </div>
  <div id="top-fade"></div>
</div>

<!-- ══ MID ZONE ══════════════════════════════════ -->
<div id="zone-mid">
  <div class="mid-slot" id="mid-0"></div>
  <div class="mid-slot" id="mid-1"></div>
  <div class="mid-slot" id="mid-2"></div>
</div>

<!-- ══ BOT ZONE ══════════════════════════════════ -->
<div id="zone-bot">
  <div id="bot-info">
    <span class="bot-label">Åpningstider</span>
    <span class="bot-hours" id="bot-hours">—</span>
  </div>
  <div id="bot-partners">
    <div class="partners-track" id="partners-track"></div>
  </div>
</div>

<!-- ══ Application logic ══════════════════════════ -->
<script>
'use strict';

const PROJ = 'n2ynpgty';
const DS   = 'production';
const API  = `https://${PROJ}.apicdn.sanity.io/v2021-10-21/data/query/${DS}`;

async function sq(query) {
  try {
    const r = await fetch(API + '?query=' + encodeURIComponent(query));
    if (!r.ok) { console.error('Sanity', r.status); return null; }
    return (await r.json()).result;
  } catch(e) { console.error('Sanity fetch:', e); return null; }
}

// ── State ─────────────────────────────────────────
let cfg      = {};
let videos   = [];
let vidIdx   = 0;
let events   = [];
let quotes   = [];
let partners = [];
let ytPlayer = null;
let ytLoaded = false;

// ── Clock ─────────────────────────────────────────
(function tickClock() {
  const n = new Date();
  const el = document.getElementById('clock');
  if (el) el.textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  setTimeout(tickClock, 1000);
}());

// ── Sanity image CDN URL ──────────────────────────
function sanityImg(ref, h) {
  if (!ref) return null;
  const m = ref.match(/^image-([a-f0-9]+)-(\d+x\d+)-(\w+)$/);
  if (!m) return null;
  return `https://cdn.sanity.io/images/${PROJ}/${DS}/${m[1]}-${m[2]}.${m[3]}?h=${h || 120}&fit=max`;
}

// ── Data loading ──────────────────────────────────
async function loadAll() {
  const [c, v, e, q, p] = await Promise.all([
    sq(`*[_type=="signageConfig"][0]{openingHours,showTime,qrUrl,memberQrUrl}`),
    sq(`*[_type=="signageVideo"&&active==true]|order(sortOrder asc){title,videoUrl,startSecs,endSecs}`),
    sq(`*[_type=="event"&&dateTime(date)>dateTime(now())]|order(date asc)[0..2]{title,date,ageGroup,price}`),
    sq(`*[_type=="signageQuote"&&active==true]|order(sortOrder asc){text,author}`),
    sq(`*[_type=="partner"&&isVisible!=false]|order(order asc){name,"logoRef":logo.asset._ref}`),
  ]);
  cfg      = c || {};
  videos   = (v || []).filter(x => x.videoUrl && x.videoUrl.trim());
  events   = Array.isArray(e) ? e : [];
  quotes   = Array.isArray(q) ? q : [];
  partners = Array.isArray(p) ? p : [];
}

async function refreshDynamic() {
  const [e, q] = await Promise.all([
    sq(`*[_type=="event"&&dateTime(date)>dateTime(now())]|order(date asc)[0..2]{title,date,ageGroup,price}`),
    sq(`*[_type=="signageQuote"&&active==true]|order(sortOrder asc){text,author}`),
  ]);
  if (Array.isArray(e)) events = e;
  if (Array.isArray(q) && q.length) quotes = q;
  renderMidZone();
}

// ── Middle zone ───────────────────────────────────
function buildSlots() {
  // Fill 3 slots: events first, then quotes as fallback
  const slots = [];
  for (const ev of events) {
    slots.push({ type: 'event', data: ev });
    if (slots.length === 3) return slots;
  }
  for (const q of quotes) {
    slots.push({ type: 'quote', data: q });
    if (slots.length === 3) return slots;
  }
  return slots;
}

function renderMidZone() {
  const slots = buildSlots();
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById(`mid-${i}`);
    if (!el) continue;
    const s = slots[i];
    if (!s) { el.className = 'mid-slot'; el.innerHTML = ''; continue; }

    if (s.type === 'event') {
      const ev = s.data;
      const d  = new Date(ev.date);
      const dateStr = d.toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long' });
      const timeStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      const meta = [ev.ageGroup, ev.price].filter(Boolean).join(' · ');
      el.className = 'mid-slot mid-event';
      el.innerHTML =
        `<div class="slot-eyebrow">Arrangement</div>` +
        `<div class="slot-date">${dateStr} — kl. ${timeStr}</div>` +
        `<div class="slot-title">${ev.title || ''}</div>` +
        (meta ? `<div class="slot-meta">${meta}</div>` : '');
    } else {
      const q = s.data;
      el.className = 'mid-slot mid-quote';
      el.innerHTML =
        `<div class="slot-qmark">"</div>` +
        `<div class="slot-qtext">${q.text || ''}</div>` +
        (q.author ? `<div class="slot-qauthor">— ${q.author}</div>` : '');
    }
  }
}

// ── Bottom zone ───────────────────────────────────
function renderBotZone() {
  const el = document.getElementById('bot-hours');
  if (el) {
    const parts = [cfg.openingHours, cfg.showTime].filter(Boolean);
    el.textContent = parts.join('  ·  ');
  }
  renderPartners();
}

function renderPartners() {
  const track = document.getElementById('partners-track');
  if (!track || !partners.length) return;
  const html = partners.map(p => {
    const url = sanityImg(p.logoRef, 112);
    return url
      ? `<div class="partner-item"><img class="partner-logo" src="${url}" alt="${p.name || ''}"></div>`
      : `<div class="partner-item"><span class="partner-name">${p.name || ''}</span></div>`;
  }).join('');
  track.innerHTML = html + html; // duplicate for seamless scroll loop
  track.style.animationDuration = Math.max(20, partners.length * 8) + 's';
}

// ── Video (top zone) ──────────────────────────────
function isYT(url)    { return /youtube\.com|youtu\.be/.test(url || ''); }
function getYTId(url) {
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?&]+)/);
  return m ? m[1] : null;
}

function setVideoMode(on) {
  document.getElementById('top-video').style.display = on ? '' : 'none';
  document.getElementById('top-shade').style.display = on ? '' : 'none';
  document.getElementById('top-name').style.display  = on ? 'none' : '';
}

function playVid(idx) {
  vidIdx = ((idx % videos.length) + videos.length) % videos.length;
  setVideoMode(true);
  const v = videos[vidIdx];
  if (isYT(v.videoUrl)) playYT(v); else playMp4(v);
}

function playMp4(v) {
  document.getElementById('yt-outer').style.display = 'none';
  const el = document.getElementById('main-video');
  el.style.display = '';
  el.src = v.videoUrl;
  el.onloadedmetadata = () => {
    if (v.startSecs) el.currentTime = v.startSecs;
    el.play().catch(() => {});
  };
  el.onended = () => playVid(vidIdx + 1);
  if (v.endSecs) {
    const g = () => {
      if (el.currentTime >= v.endSecs) { el.removeEventListener('timeupdate', g); playVid(vidIdx + 1); }
    };
    el.addEventListener('timeupdate', g);
  }
}

function loadYTApi() {
  return new Promise(resolve => {
    if (window.YT && window.YT.Player) { ytLoaded = true; resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => { ytLoaded = true; if (prev) prev(); resolve(); };
  });
}

async function playYT(v) {
  document.getElementById('main-video').style.display = 'none';
  document.getElementById('yt-outer').style.display   = '';
  if (!ytLoaded) await loadYTApi();
  const id  = getYTId(v.videoUrl);
  const end = v.endSecs || undefined;
  const onEnd = e => { if (e.data === YT.PlayerState.ENDED) playVid(vidIdx + 1); };
  if (ytPlayer) {
    ytPlayer.loadVideoById({ videoId: id, startSeconds: v.startSecs || 0, endSeconds: end });
  } else {
    ytPlayer = new YT.Player('yt-player', {
      videoId: id,
      width: '1536', height: '864',
      playerVars: { autoplay:1, mute:1, controls:0, rel:0,
                    modestbranding:1, iv_load_policy:3, disablekb:1,
                    start: v.startSecs || 0, end },
      events: { onStateChange: onEnd },
    });
  }
}

// ── Boot ──────────────────────────────────────────
(async () => {
  await loadAll();

  if (videos.length > 0) {
    playVid(0);
  } else {
    setVideoMode(false);
  }

  renderMidZone();
  renderBotZone();

  setInterval(refreshDynamic, 5 * 60 * 1000);
})();
</script>
</body>
</html>
