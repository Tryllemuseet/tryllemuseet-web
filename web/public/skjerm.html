<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<title>Tryllemuseet – Infoskjerm</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;600&display=swap');

:root {
  --black:   #1A1208;
  --deep:    #1C0509;
  --gold:    #D4A843;
  --cream:   #FBF7EF;
  --dim:     rgba(251,247,239,0.60);
  --card-bg: rgba(255,255,255,0.05);
  --border:  rgba(212,168,67,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1080px; height: 1920px;
  overflow: hidden;
  background: var(--deep);
  color: var(--cream);
  font-family: 'Source Sans 3', sans-serif;
}

/* ── Static background (shown when no videos) ─────────────── */
#static-bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 900px 600px at 50% -5%, rgba(212,168,67,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 700px 900px at 85% 110%, rgba(107,15,26,0.30) 0%, transparent 60%),
    linear-gradient(175deg, #200810 0%, #130408 55%, #1C0A10 100%);
}
#static-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 34% 42%, rgba(255,255,255,0.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 58%  7%, rgba(255,255,255,0.15) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 31%, rgba(255,255,255,0.12) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 62%, rgba(255,255,255,0.08) 0%, transparent 100%),
    radial-gradient(1px 1px at 22% 77%, rgba(255,255,255,0.10) 0%, transparent 100%),
    radial-gradient(1px 1px at 47% 88%, rgba(255,255,255,0.14) 0%, transparent 100%),
    radial-gradient(1px 1px at 91% 14%, rgba(255,255,255,0.09) 0%, transparent 100%);
}

/* ── Video layer ───────────────────────────────────────────── */
#video-layer {
  position: fixed; inset: 0; z-index: 0;
  background: #000;
  display: none;
}
#main-video {
  width: 100%; height: 100%;
  object-fit: cover;
}
#yt-wrapper {
  position: absolute; inset: 0;
  display: none;
}
#yt-wrapper iframe,
#yt-player {
  width: 100%; height: 100%;
  border: 0;
  pointer-events: none;
}

/* ── Gradient overlays for readability over video ──────────── */
.grad-top {
  position: fixed; top: 0; left: 0; right: 0; height: 320px;
  background: linear-gradient(to bottom, rgba(19,4,8,0.90) 0%, transparent 100%);
  z-index: 1; pointer-events: none;
}
.grad-bot {
  position: fixed; bottom: 64px; left: 0; right: 0; height: 560px;
  background: linear-gradient(to top, rgba(19,4,8,0.85) 0%, transparent 100%);
  z-index: 1; pointer-events: none;
}

/* ── Top bar ───────────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  display: flex; justify-content: space-between; align-items: center;
  padding: 44px 72px 0;
  z-index: 10;
}
.topbar-logo {
  height: 54px;
  width: auto;
}
.clock {
  font-size: 22px; font-weight: 300; color: var(--dim);
  letter-spacing: 0.05em; font-variant-numeric: tabular-nums;
  font-family: 'Source Sans 3', sans-serif;
}

/* ── Static hero (shown when no videos) ────────────────────── */
#static-hero {
  position: fixed; top: 130px; left: 0; right: 0;
  text-align: center; z-index: 2;
}
.museum-name {
  font-family: 'Cinzel', serif;
  font-size: 72px; font-weight: 700;
  letter-spacing: 0.02em; line-height: 1.05;
  margin-top: 20px; color: var(--cream);
}
.museum-name em { font-style: italic; color: var(--gold); }
.rule {
  height: 1px; margin: 28px 72px;
  background: linear-gradient(90deg, transparent, var(--gold) 30%, var(--gold) 70%, transparent);
  opacity: 0.5;
}

/* ── Static info cards (shown when no videos) ──────────────── */
#static-cards {
  position: fixed; top: 440px; left: 0; right: 0;
  padding: 0 72px; z-index: 2;
  display: flex; flex-direction: column; gap: 24px;
}
.card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 36px 44px;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: linear-gradient(180deg, var(--gold), transparent);
}
.card-eyebrow {
  font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 16px;
  font-family: 'Source Sans 3', sans-serif;
}
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 38px; font-weight: 700; line-height: 1.2;
  color: var(--cream); margin-bottom: 12px;
}
.card-body {
  font-size: 22px; font-weight: 300; line-height: 1.7; color: var(--dim);
}
.card-body strong { color: var(--cream); font-weight: 600; }
.prices { display: flex; gap: 36px; margin-top: 20px; }
.price-item { display: flex; flex-direction: column; gap: 4px; }
.price-label { font-size: 15px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); }
.price-value {
  font-family: 'Cinzel', serif;
  font-size: 42px; font-weight: 700; color: var(--cream); line-height: 1;
}
.price-unit { font-size: 16px; color: var(--dim); font-weight: 300; margin-top: 2px; }
.price-free { font-size: 15px; color: var(--dim); font-weight: 300; margin-top: 10px; }
.showtime { display: flex; align-items: center; gap: 20px; margin-top: 20px; }
.showtime-badge {
  background: var(--gold); color: var(--black);
  font-size: 13px; font-weight: 700; letter-spacing: 0.25em;
  text-transform: uppercase; padding: 6px 16px; border-radius: 2px; flex-shrink: 0;
  font-family: 'Source Sans 3', sans-serif;
}
.showtime-text { font-size: 22px; font-weight: 300; color: var(--cream); }

/* ── Static bottom (quote + QR) ────────────────────────────── */
#static-bottom {
  position: fixed; bottom: 80px; left: 0; right: 0;
  padding: 0 72px; z-index: 2;
  display: flex; flex-direction: column; gap: 32px;
}
.quote-block { border-top: 1px solid rgba(212,168,67,0.2); padding-top: 32px; min-height: 200px; }
.quote-mark {
  font-family: 'Lora', serif; font-size: 64px;
  color: var(--gold); opacity: 0.35; line-height: 0.6; margin-bottom: 12px;
}
.quote-text {
  font-family: 'Lora', serif; font-size: 28px; font-style: italic;
  line-height: 1.6; color: var(--cream); opacity: 0; transition: opacity 1s ease; min-height: 110px;
}
.quote-text.visible { opacity: 1; }
.quote-author {
  font-size: 15px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-top: 18px; opacity: 0; transition: opacity 1s ease 0.3s;
  font-family: 'Source Sans 3', sans-serif;
}
.quote-author.visible { opacity: 1; }
.qr-row {
  display: flex; align-items: center; gap: 32px;
  border-top: 1px solid rgba(212,168,67,0.2); padding-top: 32px;
}
#qr-main { flex-shrink: 0; border: 2px solid var(--border); border-radius: 4px; background: var(--cream); padding: 6px; }
.qr-text { display: flex; flex-direction: column; gap: 8px; }
.qr-label { font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); font-family: 'Source Sans 3', sans-serif; }
.qr-url { font-family: 'Cinzel', serif; font-size: 30px; color: var(--cream); }
.qr-sub { font-size: 17px; font-weight: 300; color: var(--dim); line-height: 1.5; }

/* ── Overlay panel (video mode) ────────────────────────────── */
#overlay-panel {
  position: fixed; left: 0; right: 0; bottom: 64px;
  max-height: 860px;
  background: rgba(20,4,8,0.93);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid rgba(212,168,67,0.45);
  z-index: 5;
  display: none;
  transform: translateY(calc(100% + 64px));
  transition: transform 0.75s cubic-bezier(0.34, 1.05, 0.64, 1);
}
#overlay-panel.panel-visible { transform: translateY(0); }

.panel-inner {
  padding: 52px 72px 56px;
}
.panel-eyebrow {
  font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 32px;
  font-family: 'Source Sans 3', sans-serif;
}

/* Events panel */
.ev-list { display: flex; flex-direction: column; gap: 32px; }
.ev-item { display: flex; flex-direction: column; gap: 6px; }
.ev-date { font-size: 17px; color: var(--gold); letter-spacing: 0.12em; text-transform: uppercase; font-family: 'Source Sans 3', sans-serif; }
.ev-title { font-family: 'Cinzel', serif; font-size: 40px; font-weight: 700; color: var(--cream); line-height: 1.15; }
.ev-meta { font-size: 20px; font-weight: 300; color: var(--dim); }
.ev-divider { height: 1px; background: var(--border); margin: 0; }

/* Info panel */
.panel-info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;
}
.info-big { font-family: 'Cinzel', serif; font-size: 50px; font-weight: 700; line-height: 1.1; color: var(--cream); }
.info-med { font-size: 26px; font-weight: 300; color: var(--cream); margin-top: 8px; }
.info-small { font-size: 19px; color: var(--dim); line-height: 1.6; margin-top: 8px; }
.panel-showtime { display: flex; align-items: center; gap: 16px; margin-top: 22px; }
.panel-badge {
  background: var(--gold); color: var(--black);
  font-size: 12px; font-weight: 700; letter-spacing: 0.25em;
  text-transform: uppercase; padding: 5px 14px; border-radius: 2px; flex-shrink: 0;
  font-family: 'Source Sans 3', sans-serif;
}
.price-row { display: flex; gap: 44px; margin-top: 24px; }
.p-item { display: flex; flex-direction: column; }
.p-lbl { font-size: 14px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.18em; font-family: 'Source Sans 3', sans-serif; }
.p-val { font-family: 'Cinzel', serif; font-size: 58px; font-weight: 700; line-height: 1; color: var(--cream); }
.p-unit { font-size: 17px; color: var(--dim); margin-top: 2px; }

/* Bli-med panel */
.panel-blimedlem { display: flex; align-items: center; gap: 64px; }
.bm-left { flex: 1; }
.bm-heading {
  font-family: 'Cinzel', serif; font-size: 74px; font-weight: 700;
  line-height: 1.08; color: var(--cream); margin-top: 8px;
}
.bm-heading em { font-style: italic; color: var(--gold); }
.bm-sub { font-size: 22px; font-weight: 300; color: var(--dim); margin-top: 18px; line-height: 1.5; }
.bm-right { display: flex; flex-direction: column; align-items: center; gap: 14px; flex-shrink: 0; }
#qr-blimedlem { border: 2px solid var(--border); border-radius: 4px; background: var(--cream); padding: 8px; display: block; }
.bm-qr-url { font-family: 'Source Sans 3', sans-serif; font-size: 20px; color: var(--dim); text-align: center; }

/* Quote panel */
.panel-quote { max-width: 920px; }
.pq-mark {
  font-family: 'Lora', serif; font-size: 80px;
  color: var(--gold); opacity: 0.38; line-height: 0.6; margin-bottom: 20px;
}
.pq-text {
  font-family: 'Lora', serif; font-size: 36px;
  font-style: italic; line-height: 1.55; color: var(--cream);
}
.pq-author {
  font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-top: 28px;
  font-family: 'Source Sans 3', sans-serif;
}

/* ── Static events section ─────────────────────────────────── */
#static-events {
  position: fixed; top: 1000px; left: 0; right: 0;
  padding: 0 72px; z-index: 2;
}
.sevt-eyebrow {
  display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
  font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); font-weight: 600;
  font-family: 'Source Sans 3', sans-serif;
}
.live-pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); flex-shrink: 0;
  animation: live-blink 2.5s ease-in-out infinite;
}
@keyframes live-blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}
.sevt-item {
  border-top: 1px solid var(--border); padding: 22px 0;
}
.sevt-date {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 16px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 6px;
}
.sevt-title {
  font-family: 'Cinzel', serif;
  font-size: 28px; font-weight: 700; color: var(--cream); line-height: 1.2;
}
.sevt-meta { font-size: 17px; font-weight: 300; color: var(--dim); margin-top: 4px; }
.sevt-none {
  border-top: 1px solid var(--border); padding: 22px 0;
  font-size: 20px; font-weight: 300; color: var(--dim);
}

/* ── Ticker bar ─────────────────────────────────────────────── */
.ticker-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 64px;
  background: rgba(19,4,8,0.97);
  border-top: 1px solid rgba(212,168,67,0.30);
  overflow: hidden; z-index: 10;
  display: flex; align-items: center;
}
.ticker-track {
  display: inline-flex; white-space: nowrap;
  animation: ticker-roll linear infinite paused;
  --tw: -6000px;
}
@keyframes ticker-roll {
  from { transform: translateX(0); }
  to   { transform: translateX(var(--tw)); }
}
.ticker-item {
  font-size: 22px; color: var(--cream);
  letter-spacing: 0.05em; padding-right: 120px;
  font-family: 'Source Sans 3', sans-serif;
}
.ticker-item .t-title { color: var(--gold); font-weight: 600; }
.ticker-item .t-date  { color: var(--dim); }
.ticker-item .t-sep   { color: rgba(212,168,67,0.45); margin: 0 8px; }
</style>
</head>
<body>

<!-- Static background (starfield/gradient — hidden in video mode) -->
<div id="static-bg"></div>

<!-- Video layer -->
<div id="video-layer">
  <video id="main-video" autoplay muted playsinline></video>
  <div id="yt-wrapper"><div id="yt-player"></div></div>
</div>

<!-- Gradient readability overlays (always present in video mode) -->
<div class="grad-top" id="grad-top" style="display:none"></div>
<div class="grad-bot" id="grad-bot" style="display:none"></div>

<!-- Permanent top bar -->
<div class="topbar">
  <img class="topbar-logo" src="/LOGO-bred.png" alt="Tryllemuseet">
  <span class="clock" id="clock">--:--</span>
</div>

<!-- Static content (hidden in video mode) -->
<div id="static-hero">
  <h1 class="museum-name">Trylle<em>museet</em></h1>
</div>
<div class="rule" id="static-rule"></div>
<div id="static-cards">
  <div class="card">
    <div class="card-eyebrow">Åpningstider</div>
    <div class="card-title" id="s-opening-hours">Søndager</div>
    <div class="card-body" id="s-opening-body"><strong>kl. 13:00 – 16:00</strong></div>
    <div class="showtime">
      <span class="showtime-badge">Mini-show</span>
      <span class="showtime-text" id="s-show-time">Kl. 14:00 — presis</span>
    </div>
  </div>
  <div class="card">
    <div class="card-eyebrow">Inngang</div>
    <div class="prices">
      <div class="price-item">
        <span class="price-label">Voksen</span>
        <span class="price-value" id="s-price-adult">50</span>
        <span class="price-unit">kroner</span>
      </div>
      <div class="price-item">
        <span class="price-label">Barn</span>
        <span class="price-value" id="s-price-child">20</span>
        <span class="price-unit">kroner</span>
      </div>
    </div>
    <div class="price-free">Gratis for medlemmer av DMR og MCN</div>
  </div>
</div>
<div id="static-events">
  <div class="sevt-eyebrow">
    <span class="live-pulse"></span>
    <span>Kommende arrangementer</span>
  </div>
  <div id="sevt-list"></div>
</div>
<div id="static-bottom">
  <div class="quote-block">
    <div class="quote-mark">"</div>
    <div class="quote-text" id="s-quote-text"></div>
    <div class="quote-author" id="s-quote-author"></div>
  </div>
  <div class="qr-row">
    <canvas id="qr-main" width="160" height="160"></canvas>
    <div class="qr-text">
      <span class="qr-label">Besøk oss på nett</span>
      <span class="qr-url" id="s-qr-url-label">tryllemuseet.no</span>
      <span class="qr-sub">Historier, magikere<br>og mer magi</span>
    </div>
  </div>
</div>

<!-- Overlay panel (video mode — slides up from bottom) -->
<div id="overlay-panel"></div>

<!-- Ticker bar (always visible) -->
<div class="ticker-bar">
  <div class="ticker-track" id="ticker-track"></div>
</div>

<script>
'use strict';

// ── Sanity ────────────────────────────────────────────────────
const PROJ = 'n2ynpgty';
const DS   = 'production';
const API  = `https://${PROJ}.apicdn.sanity.io/v2021-10-21/data/query/${DS}`;

async function sq(query) {
  try {
    const res = await fetch(API + '?query=' + encodeURIComponent(query));
    if (!res.ok) { console.error('Sanity API feil', res.status, await res.text()); return null; }
    return (await res.json()).result;
  } catch(e) { console.error('Sanity fetch feil:', e); return null; }
}

// ── State ─────────────────────────────────────────────────────
let cfg       = {};
let videos    = [];
let vidIdx    = 0;
let events    = [];
let quotes    = [];
let quoteIdx  = 0;
let panelIdx  = 0;
let panelTmr  = null;
let ytPlayer  = null;
let ytLoaded  = false;
let videoMode = false;

const PANEL_SEQ = ['events', 'info', 'blimedlem', 'quote'];
const VIDEO_GAP = 10000; // ms of pure video between panels
const FALLBACK_QUOTES = [
  { text: 'Der det umulige er mulig og ting gjemmer seg inne i magiske hatter.', author: 'Norges Tryllemuseum' },
  { text: 'Henrik Ibsen var faktisk tryllekunstner — visste du det?', author: 'Fra samlingen vår' },
  { text: 'Over 171 norske tryllemestere dokumentert — og historien fortsetter.', author: 'Magiens Hvem er Hvem' },
];

// ── Clock ─────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
tickClock();
setInterval(tickClock, 1000);

// ── Data loading ──────────────────────────────────────────────
async function loadAll() {
  const [c, v, e, q] = await Promise.all([
    sq(`*[_type=="signageConfig"][0]{qrUrl,openingHours,showTime,priceAdult,priceChild,quoteCycleSecs,memberQrUrl,overlayPanelSecs}`),
    sq(`*[_type=="signageVideo"&&active==true]|order(sortOrder asc){title,videoUrl,startSecs,endSecs}`),
    sq(`*[_type=="event"&&dateTime(date)>dateTime(now())]|order(date asc)[0..2]{title,date,ageGroup,price}`),
    sq(`*[_type=="signageQuote"&&active==true]|order(sortOrder asc){text,author}`),
  ]);
  cfg    = c || {};
  videos = v || [];
  events = e || [];
  quotes = (q && q.length) ? q : FALLBACK_QUOTES;
}

async function refreshDynamic() {
  const [e, q] = await Promise.all([
    sq(`*[_type=="event"&&dateTime(date)>dateTime(now())]|order(date asc)[0..2]{title,date,ageGroup,price}`),
    sq(`*[_type=="signageQuote"&&active==true]|order(sortOrder asc){text,author}`),
  ]);
  if (e) events = e;
  if (q && q.length) quotes = q;
  if (!videoMode) renderStaticEvents();
  startTicker();
}

// ── Helpers ───────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long' })
    + ' kl. ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function drawQR(canvasId, url, size) {
  try { new QRDrawer(document.getElementById(canvasId), {}, size).draw(url); } catch(_) {}
}

// ── Static mode (no videos) ───────────────────────────────────
function setupStaticMode() {
  if (cfg.openingHours) {
    const p = cfg.openingHours.split(/\s+(?=kl\.)/i);
    document.getElementById('s-opening-hours').textContent = p[0] || 'Søndager';
    if (p[1]) document.getElementById('s-opening-body').innerHTML = `<strong>${p[1]}</strong>`;
  }
  if (cfg.showTime)   document.getElementById('s-show-time').textContent   = cfg.showTime;
  if (cfg.priceAdult) document.getElementById('s-price-adult').textContent = cfg.priceAdult;
  if (cfg.priceChild) document.getElementById('s-price-child').textContent = cfg.priceChild;

  const qrUrl = cfg.qrUrl || 'https://tryllemuseet.no';
  drawQR('qr-main', qrUrl, 160);
  try {
    document.getElementById('s-qr-url-label').textContent = new URL(qrUrl).hostname.replace(/^www\./,'');
  } catch(_) {}

  renderStaticEvents();
  startStaticQuoteRotation();
}

function renderStaticEvents() {
  const list = document.getElementById('sevt-list');
  if (!list) return;
  if (!events.length) {
    list.innerHTML = '<div class="sevt-none">Ingen kommende arrangementer registrert</div>';
    return;
  }
  list.innerHTML = events.slice(0, 2).map(ev => {
    const d = new Date(ev.date);
    const dateStr = d.toLocaleDateString('nb-NO', { weekday: 'long', day: 'numeric', month: 'long' });
    const timeStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    const meta = [ev.ageGroup, ev.price || null, 'kl. ' + timeStr].filter(Boolean).join(' · ');
    return `<div class="sevt-item">
      <div class="sevt-date">${dateStr}</div>
      <div class="sevt-title">${ev.title || ''}</div>
      ${meta ? `<div class="sevt-meta">${meta}</div>` : ''}
    </div>`;
  }).join('');
}

let staticQuoteTimer = null;
function startStaticQuoteRotation() {
  const textEl   = document.getElementById('s-quote-text');
  const authorEl = document.getElementById('s-quote-author');
  let cur = 0;
  if (staticQuoteTimer) clearInterval(staticQuoteTimer);

  function show(i) {
    textEl.classList.remove('visible');
    authorEl.classList.remove('visible');
    setTimeout(() => {
      textEl.textContent   = quotes[i].text;
      authorEl.textContent = '— ' + (quotes[i].author || '');
      textEl.classList.add('visible');
      authorEl.classList.add('visible');
    }, 1000);
  }
  show(0);
  staticQuoteTimer = setInterval(() => { cur = (cur + 1) % quotes.length; show(cur); },
    (cfg.quoteCycleSecs || 9) * 1000);
}

// ── Video mode ────────────────────────────────────────────────
function isYT(url) { return /youtube\.com|youtu\.be/.test(url || ''); }

function getYTId(url) {
  const m = url.match(/[?&]v=([^&]+)/) || url.match(/youtu\.be\/([^?&]+)/);
  return m ? m[1] : null;
}

function enterVideoMode() {
  videoMode = true;
  document.getElementById('static-bg').style.display    = 'none';
  document.getElementById('static-hero').style.display  = 'none';
  document.getElementById('static-rule').style.display  = 'none';
  document.getElementById('static-cards').style.display  = 'none';
  document.getElementById('static-events').style.display = 'none';
  document.getElementById('static-bottom').style.display = 'none';
  document.getElementById('video-layer').style.display  = '';
  document.getElementById('grad-top').style.display     = '';
  document.getElementById('grad-bot').style.display     = '';
  playVid(0);
}

function playVid(idx) {
  vidIdx = ((idx % videos.length) + videos.length) % videos.length;
  const v = videos[vidIdx];
  if (isYT(v.videoUrl)) { playYT(v); } else { playMP4(v); }
}

function playMP4(v) {
  document.getElementById('yt-wrapper').style.display  = 'none';
  const el = document.getElementById('main-video');
  el.style.display = '';
  el.src = v.videoUrl;
  const start = v.startSecs || 0;
  const end   = v.endSecs   || 0;

  el.onloadedmetadata = () => {
    if (start > 0) el.currentTime = start;
    el.play().catch(() => {});
  };
  el.onended = () => playVid(vidIdx + 1);

  if (end > 0) {
    const guard = () => {
      if (el.currentTime >= end) {
        el.removeEventListener('timeupdate', guard);
        playVid(vidIdx + 1);
      }
    };
    el.addEventListener('timeupdate', guard);
  }
}

async function playYT(v) {
  document.getElementById('main-video').style.display  = 'none';
  document.getElementById('yt-wrapper').style.display  = '';
  if (!ytLoaded) await loadYTApi();

  const id    = getYTId(v.videoUrl);
  const start = v.startSecs || 0;
  const end   = v.endSecs   || 0;

  const onEnd = (e) => { if (e.data === YT.PlayerState.ENDED) playVid(vidIdx + 1); };

  if (ytPlayer) {
    ytPlayer.loadVideoById({ videoId: id, startSeconds: start, endSeconds: end || undefined });
  } else {
    ytPlayer = new YT.Player('yt-player', {
      videoId: id,
      width: '1080', height: '1920',
      playerVars: { autoplay:1, mute:1, controls:0, rel:0,
                    modestbranding:1, iv_load_policy:3, disablekb:1,
                    start, end: end || undefined },
      events: { onStateChange: onEnd },
    });
  }
}

function loadYTApi() {
  return new Promise(resolve => {
    if (window.YT && window.YT.Player) { ytLoaded = true; resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
    const prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = () => { ytLoaded = true; if (prev) prev(); resolve(); };
  });
}

// ── Overlay panels ────────────────────────────────────────────
function htmlEventsPanel() {
  if (!events.length) return htmlInfoPanel();
  const items = events.slice(0, 3).map((e, i) => `
    ${i > 0 ? '<div class="ev-divider"></div>' : ''}
    <div class="ev-item">
      <div class="ev-date">${fmtDate(e.date)}</div>
      <div class="ev-title">${e.title || ''}</div>
      ${(e.ageGroup || e.price) ? `<div class="ev-meta">${[e.ageGroup, e.price].filter(Boolean).join(' · ')}</div>` : ''}
    </div>`).join('');
  return `<div class="panel-inner">
    <div class="panel-eyebrow">Kommende arrangementer</div>
    <div class="ev-list">${items}</div>
  </div>`;
}

function htmlInfoPanel() {
  const hours = cfg.openingHours || 'Søndager kl. 13:00 – 16:00';
  const parts = hours.split(/\s+(?=kl\.)/i);
  return `<div class="panel-inner panel-info-grid">
    <div>
      <div class="panel-eyebrow">Åpningstider</div>
      <div class="info-big">${parts[0] || 'Søndager'}</div>
      <div class="info-med">${parts[1] || ''}</div>
      ${cfg.showTime ? `<div class="panel-showtime"><span class="panel-badge">Mini-show</span><span class="info-med">${cfg.showTime}</span></div>` : ''}
    </div>
    <div>
      <div class="panel-eyebrow">Inngang</div>
      <div class="price-row">
        <div class="p-item"><span class="p-lbl">Voksen</span><span class="p-val">${cfg.priceAdult || 50}</span><span class="p-unit">kr</span></div>
        <div class="p-item"><span class="p-lbl">Barn</span><span class="p-val">${cfg.priceChild || 20}</span><span class="p-unit">kr</span></div>
      </div>
      <div class="info-small" style="margin-top:16px">Gratis for DMR- og MCN-medlemmer</div>
    </div>
  </div>`;
}

function htmlBliMedPanel() {
  const url = cfg.memberQrUrl || 'https://tryllemuseet.no/blimedlem';
  let label = url;
  try { const u = new URL(url); label = u.hostname.replace(/^www\./, '') + u.pathname; } catch(_) {}
  return `<div class="panel-inner panel-blimedlem">
    <div class="bm-left">
      <div class="panel-eyebrow">Støtt museet</div>
      <div class="bm-heading">Bli<br><em>medlem</em></div>
      <div class="bm-sub">Støtt Norges eneste<br>tryllemuseum</div>
    </div>
    <div class="bm-right">
      <canvas id="qr-blimedlem" width="240" height="240"></canvas>
      <div class="bm-qr-url">${label}</div>
    </div>
  </div>`;
}

function htmlQuotePanel() {
  if (!quotes.length) return htmlInfoPanel();
  const q = quotes[quoteIdx];
  quoteIdx = (quoteIdx + 1) % quotes.length;
  return `<div class="panel-inner panel-quote">
    <div class="pq-mark">"</div>
    <div class="pq-text">${q.text || ''}</div>
    ${q.author ? `<div class="pq-author">— ${q.author}</div>` : ''}
  </div>`;
}

function getPanelHtml(type) {
  switch (type) {
    case 'events':    return htmlEventsPanel();
    case 'info':      return htmlInfoPanel();
    case 'blimedlem': return htmlBliMedPanel();
    case 'quote':     return htmlQuotePanel();
    default:          return '';
  }
}

function showPanel(type, whenDone) {
  if (panelTmr) { clearTimeout(panelTmr); panelTmr = null; }
  const el = document.getElementById('overlay-panel');
  el.innerHTML = getPanelHtml(type);
  el.style.display = '';

  if (type === 'blimedlem') {
    requestAnimationFrame(() => drawQR('qr-blimedlem', cfg.memberQrUrl || 'https://tryllemuseet.no/blimedlem', 240));
  }

  // Double rAF ensures element is painted before class triggers transition
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('panel-visible')));

  const visMs = (cfg.overlayPanelSecs || 18) * 1000;
  panelTmr = setTimeout(() => hidePanel(whenDone), visMs);
}

function hidePanel(cb) {
  const el = document.getElementById('overlay-panel');
  el.classList.remove('panel-visible');
  setTimeout(() => { el.style.display = 'none'; if (cb) cb(); }, 800);
}

function runPanelCycle() {
  const type = PANEL_SEQ[panelIdx];
  panelIdx = (panelIdx + 1) % PANEL_SEQ.length;
  showPanel(type, () => {
    // Brief video-only gap, then next panel
    panelTmr = setTimeout(runPanelCycle, VIDEO_GAP);
  });
}

// ── Ticker ────────────────────────────────────────────────────
function startTicker() {
  const track = document.getElementById('ticker-track');

  let html = '';
  if (events.length) {
    const parts = events.map(e => {
      const d = new Date(e.date);
      const ds = d.toLocaleDateString('nb-NO', { weekday: 'short', day: 'numeric', month: 'short' });
      const ts = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
      return `<span class="t-title">${e.title}</span>`
           + `<span class="t-sep">·</span>`
           + `<span class="t-date">${ds} kl. ${ts}</span>`;
    });
    const inner = parts.map(p => `<span class="ticker-item">${p}</span>`).join('<span class="t-sep" style="padding-right:80px">·</span>');
    html = inner + '<span aria-hidden="true">' + inner + '</span>';
  } else {
    const txt = 'Tryllemuseet — Norges minste, merkeligste og mest magiske museum · tryllemuseet.no';
    html = `<span class="ticker-item">${txt}</span><span class="ticker-item" aria-hidden="true">${txt}</span>`;
  }

  track.innerHTML = html;
  track.style.animationPlayState = 'paused';

  // Measure then start
  setTimeout(() => {
    const half = track.offsetWidth / 2;
    const spd  = 130; // px/s
    const dur  = (half / spd).toFixed(1);
    track.style.setProperty('--tw', `-${half}px`);
    track.style.animationDuration = `${dur}s`;
    track.style.animationPlayState = 'running';
  }, 120);
}

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  await loadAll();

  if (videos.length > 0) {
    enterVideoMode();
    // Start panel cycle after a short delay so first video plays cleanly first
    panelTmr = setTimeout(runPanelCycle, 5000);
  } else {
    setupStaticMode();
  }

  startTicker();

  // Refresh live data every 5 min
  setInterval(refreshDynamic, 5 * 60 * 1000);
})();
</script>
