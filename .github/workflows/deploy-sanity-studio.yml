name: Deploy Sanity Studio

on:
  push:
    branches:
      - main
    paths:
      - 'schemaTypes/**'
      - 'sanity.config.ts'
      - 'sanity.cli.ts'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to sanity.studio
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Sanity CLI
        run: npm install -g sanity

      - name: Deploy Sanity Studio
        run: sanity deploy --yes
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
