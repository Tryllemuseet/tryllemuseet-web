name: Sync YouTube clips (Egelos)

on:
  schedule:
    # Daglig kl. 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Sanity-dataset (staging eller production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  sync:
    name: Import YouTube → Sanity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run import script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SANITY_TOKEN:    ${{ secrets.SANITY_TOKEN }}
          # schedule-kjøringer bruker staging (trygg standard);
          # manuell kjøring bruker valgt dataset
          SANITY_DATASET: ${{ github.event_name == 'workflow_dispatch' && inputs.dataset || 'staging' }}
        run: node scripts/importYouTubeClips.mjs
