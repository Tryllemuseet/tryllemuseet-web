name: Daily rebuild (publish scheduled content)

on:
  schedule:
    # Daily at 05:30 UTC — before the YouTube sync job (06:00 UTC)
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  rebuild:
    name: Trigger Vercel deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger test deploy hook
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_TEST" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_TEST secret is empty or unset"
            exit 1
          fi
          curl --fail -sS -X POST "$VERCEL_DEPLOY_HOOK_TEST"
        env:
          VERCEL_DEPLOY_HOOK_TEST: ${{ secrets.VERCEL_DEPLOY_HOOK_TEST }}

      - name: Trigger production deploy hook
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_PROD" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_PROD secret is empty or unset"
            exit 1
          fi
          curl --fail -sS -X POST "$VERCEL_DEPLOY_HOOK_PROD"
        env:
          VERCEL_DEPLOY_HOOK_PROD: ${{ secrets.VERCEL_DEPLOY_HOOK_PROD }}
